<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="login-card">

        <img
            src="Assets/Grafik/login-illustration.png"
            alt="Harz Wanderung"
            class="hero-image">

        <h1>Willkommen zurück!</h1>

        <p class="subtitle">
            Für dich. Für uns. Für unsere Abenteuer. ❤️
        </p>    

        <input
            id="email"
            type="email"
            placeholder="E-Mail-Adresse">

        <input
            id="password"
            type="password"
            placeholder="Passwort">

        <button id="login-btn">
            Anmelden
        </button>

        <p id="error"></p>

    </div>

    <script
        type="module"
        src="js/login.js">
    </script>

</body>

</html>
